        });
      }

      if (bossType === "Teleport Boss") {
        level.path.slice(2, -1).forEach((platform, index) => {
          if (index % 3 === 1) {
            level.traps.push({ x: platform.x + platform.w * 0.35, y: platform.y - 70, w: 52, h: 70, type: "teleport", triggered: false, boss: true });
          }
        });
      }
    }

    function makeRareEasy(level, rng) {
      level.hazards = level.hazards.slice(0, 1);
      level.traps = level.traps.filter(trap => trap.type === "fakeAchievement").slice(0, 1);
      const p = level.path[Math.floor(level.path.length * 0.45)];
      level.signs.push({
        x: p.x + 18,
        y: p.y - 56,
        w: 38,
        h: 46,
        text: "ACTUALLY EASY",
        truth: true,
        recommendation: "right",
        read: false,
        judged: false
      });
    }

    function update(dt) {
      if (screen !== "game" || !game) return;
      dt = Math.min(dt, MAX_DT);
      game.time += dt;
      save.playTimeMs += dt * 1000;
      playtimeSaveClock += dt;
      if (playtimeSaveClock > 10) {
        playtimeSaveClock = 0;
        saveGame();
      }

      if (toastTimer > 0) {
        toastTimer -= dt;
        if (toastTimer <= 0) toastEl.classList.remove("show");
      }

      if (game.frozenUntil > game.time) {
        updateParticles(dt);
        updateCamera(dt);
        return;
      }

      if (game.gravityUntil && game.time > game.gravityUntil) {
        game.gravityDir = 1;
        game.gravityUntil = 0;
        showToast("Gravity apologized and left.");
      }

      updatePlatforms(dt);
      updatePlayer(dt);
      updateSigns();
      updateTrolls(dt);
      updateParticles(dt);
      updateCamera(dt);
      updateHud();
      input.jumpPressed = false;
    }

    function updatePlatforms(dt) {
      for (const platform of game.platforms) {
        platform.dx = 0;
        platform.dy = 0;
        if (platform.type === "moving") {
          const oldX = platform.x;
          platform.x = platform.baseX + Math.sin(game.time * platform.speed + platform.phase) * platform.amplitude;
          platform.dx = platform.x - oldX;
        }
        if (platform.type === "disappear") {
          if (platform.vanishTimer > 0) {
            platform.vanishTimer += dt;
            const vanishDelay = platform.vanishDelay || 0.72;
            platform.alpha = clamp(1 - platform.vanishTimer / vanishDelay, 0.15, 1);
            if (platform.vanishTimer > vanishDelay) {
              platform.solid = false;
              platform.vanished = true;
            }
          }
        }
      }
    }

    function updatePlayer(dt) {
      const p = game.player;
      if (!p.alive) return;
      p.spawnGrace = Math.max(0, p.spawnGrace - dt);

      game.behavior.frames++;
      if (input.left) game.behavior.leftFrames++;
      if (input.right) game.behavior.rightFrames++;
      const previousX = p.x;
      const previousY = p.y;

      const reversed = game.time < game.reverseUntil;
      let left = input.left;
      let right = input.right;
      if (reversed) [left, right] = [right, left];

      const desired = (right ? 1 : 0) - (left ? 1 : 0);
      if (desired) {
        p.vx += desired * PLAYER.accel * dt;
        p.vx = clamp(p.vx, -PLAYER.maxSpeed, PLAYER.maxSpeed);
        p.facing = desired;
      } else {
        const friction = PLAYER.friction * dt;
        if (Math.abs(p.vx) <= friction) p.vx = 0;
        else p.vx -= Math.sign(p.vx) * friction;
      }

      if (Math.abs(p.vx) < 18 && p.onGround) game.behavior.waitFrames++;
      if (Math.abs(p.vx) > PLAYER.maxSpeed * 0.72) game.behavior.fastFrames++;
      game.behavior.distance += Math.abs(p.x - game.behavior.previousX);
      game.behavior.previousX = p.x;

      if (input.jumpPressed) {
        p.jumpBuffer = 0.13;
        game.behavior.jumpAttempts++;
      } else {
        p.jumpBuffer = Math.max(0, p.jumpBuffer - dt);
      }

      if (p.onGround) {
        p.coyote = 0.12;
        p.doubleJumpUsed = false;
      } else {
        p.coyote = Math.max(0, p.coyote - dt);
      }

      if (p.jumpBuffer > 0) {

        if (p.coyote > 0) {
          p.vy = -PLAYER.jump * game.gravityDir;
          p.onGround = false;
          p.coyote = 0;
          p.jumpBuffer = 0;
          game.behavior.jumps++;
          playSound("jump");
          burst(p.x + p.w / 2, p.y + p.h, "#fff8db", 8);
        }

        else if (!p.doubleJumpUsed) {
          p.vy = -PLAYER.jump * 0.9 * game.gravityDir;
          p.doubleJumpUsed = true;
          p.jumpBuffer = 0;
          playSound("jump");
          burst(p.x + p.w / 2, p.y + p.h, "#34f5c5", 12);
        }
      }

      p.vy += GRAVITY * game.gravityDir * dt;
      p.vy = clamp(p.vy, -920, 920);

      p.x += p.vx * dt;
      resolveHorizontal(p);

      p.y += p.vy * dt;
      p.onGround = false;
      const stoodOn = resolveVertical(p, previousY);
      if (stoodOn && stoodOn.type === "moving") p.x += stoodOn.dx || 0;

      if (stoodOn && stoodOn.type === "disappear" && !stoodOn.vanished) {
        if (!stoodOn.vanishTimer) {
          stoodOn.vanishTimer = 0.001;
          floatingText(stoodOn.x + stoodOn.w / 2, stoodOn.y - 10, "bye", "#ff3d81");
        }
      }

      if (stoodOn && stoodOn.type === "fake") {
        stoodOn.solid = false;
        stoodOn.alpha = 0.18;
        game.shake = 7;
        showToast("That platform has resigned.");
        playSound("troll");
        burst(p.x + p.w / 2, p.y + p.h, "#34f5c5", 18);
      }

      const nearestHazard = nearestActiveHazard(p.x + p.w / 2, p.y + p.h / 2);
      if (nearestHazard && nearestHazard.distance < 62 && Math.abs(p.vx) > 110) game.behavior.riskFrames++;

      game.runSamples.push({
        x: p.x,
        y: p.y,
        facing: p.facing,
        t: game.time,
        gravity: game.gravityDir
      });
      if (game.runSamples.length > 900) game.runSamples.shift();

      checkHazards();
      checkCheckpoints();
      checkExits();
      checkButtons();
      checkFakeWalls();

      if (p.y > H + 220 || p.y + p.h < -220 || p.x < -180) {
        killPlayer(p.y > H ? "The floor was farther down than advertised." : "You left the map. Bold.");
      }

      if (p.x > game.width + 180) {
        killPlayer("You overshot the ending. The game respects the commitment.");
      }

      if (previousX !== p.x || previousY !== p.y) {
        judgeSignBehavior(previousX, previousY);
      }
    }

    function resolveHorizontal(p) {
      p.x = clamp(p.x, -120, game.width + 120);
      for (const platform of game.platforms) {
        if (!isSolidPlatform(platform) || !rectsOverlap(p, platform)) continue;
        if (p.vx > 0) p.x = platform.x - p.w;
        else if (p.vx < 0) p.x = platform.x + platform.w;
        p.vx = 0;
      }
    }

    function resolveVertical(p, previousY) {
      let stoodOn = null;
      for (const platform of game.platforms) {
        if (!isSolidPlatform(platform) || !rectsOverlap(p, platform)) continue;
        const falling = p.vy * game.gravityDir > 0;
        if (falling) {
          if (game.gravityDir > 0 && previousY + p.h <= platform.y + 10) {
            p.y = platform.y - p.h;
            p.vy = 0;
            p.onGround = true;
            stoodOn = platform;
          } else if (game.gravityDir < 0 && previousY >= platform.y + platform.h - 10) {
            p.y = platform.y + platform.h;
            p.vy = 0;
            p.onGround = true;
            stoodOn = platform;
          }
        } else {
          if (game.gravityDir > 0 && previousY >= platform.y + platform.h - 10) {
            p.y = platform.y + platform.h;
            p.vy = 0;
          } else if (game.gravityDir < 0 && previousY + p.h <= platform.y + 10) {
            p.y = platform.y - p.h;
            p.vy = 0;
          }
        }
      }
      return stoodOn;
    }

    function isSolidPlatform(platform) {
      return platform.solid && platform.alpha > 0.12;
    }

    function nearestActiveHazard(x, y) {
      let best = null;
      for (const hazard of game.hazards) {
        if (!hazard.active) continue;
        const cx = hazard.x + hazard.w / 2;
        const cy = hazard.y + hazard.h / 2;
        const distance = pointDistance(x, y, cx, cy);
        if (!best || distance < best.distance) best = { hazard, distance };
      }
      return best;
    }

    function checkHazards() {
      const p = game.player;
      for (const hazard of game.hazards) {
        if (!hazard.active) continue;
        if (hazard.type === "invisible" && pointDistance(p.x, p.y, hazard.x, hazard.y) < 130) {
          hazard.revealed = true;
        }
        if (hazard.type === "antiJump" && p.vy * game.gravityDir < -80) {
          hazard.revealed = true;
        }
        if (rectsOverlap(p, hazard)) {
          killPlayer(hazard.type === "invisible" ? "Invisible trap. Very visible result." : "The spikes were networking.");
          return;
        }
      }
    }

    function checkCheckpoints() {
      const p = game.player;
      for (const checkpoint of game.checkpoints) {
        if (checkpoint.used || !rectsOverlap(p, checkpoint)) continue;
        checkpoint.used = true;
        if (checkpoint.fake) {
          showToast("Checkpoint saved. (This is a decorative sentence.)");
          playSound("troll");
          fakePopup("Checkpoint", "Saved to: nowhere/cloud/nope.chk", true);
          game.shake = 5;
        } else {
          game.checkpointIndex = checkpoint.index;
          game.spawnX = checkpoint.x + 12;
          game.spawnY = checkpoint.y - PLAYER.h - 2;
          showToast("Real checkpoint! The intern let one slip.");
          playSound("achievement");
        }
      }
    }

    function checkExits() {
      const p = game.player;
      for (const exit of game.exits) {
        if (!exit.fake && exit.moving && exit.moveCount < 3) {
          const distance = Math.abs((p.x + p.w / 2) - (exit.x + exit.w / 2));
          if (distance < 105 && p.y + p.h > exit.y && p.y < exit.y + exit.h + 60) {
            exit.moveCount++;
            exit.x += 74 + exit.moveCount * 26;
            exit.x = Math.min(exit.x, game.width - 90);
            game.exitMercy = game.time + 1.7;
            showToast(exit.moveCount < 3 ? "The exit needs personal space." : "Fine. The exit is tired.");
            playSound("troll");
            game.shake = 8;
          }
        }
        if (rectsOverlap(p, exit)) {
          if (exit.fake) {
            triggerFakeVictory(exit);
          } else {
            completeLevel();
          }
          return;
        }
      }
    }

    function triggerFakeVictory(exit) {
      if (exit.used) return;
      exit.used = true;
      save.stats.fakeVictories++;
      unlock("fakeVictory");
      playSound("win");
      fakeFullScreen("VICTORY!", [
        "You beat the game.",
        "Please enjoy this fake completion screen.",
        "Okay, back in the hole."
      ], 1500, () => {
        if (!game || !game.player) return;
        game.player.x = Math.max(60, exit.x - 180);
        game.player.y = exit.y - PLAYER.h - 10;
        game.player.vx = -120;
        game.player.vy = -240;
        game.shake = 10;
      });
    }

    function checkButtons() {
      const p = game.player;
      for (const button of game.buttons) {
        if (button.pressed || !rectsOverlap(p, button)) continue;
        button.pressed = true;
        playSound("troll");
        game.shake = 7;
        const actions = ["fakeCrash", "obstacleShuffle", "reverse", "fakeAchievement", "cheatingDisabled"];
        activateTrap({ type: choose(game.rng, actions), triggered: false, button: true });
        floatingText(button.x + button.w / 2, button.y - 18, "why", "#ffd166");
      }
    }

    function checkFakeWalls() {
      const p = game.player;
      for (const wall of game.fakeWalls) {
        if (wall.touched || !rectsOverlap(p, wall)) continue;
        wall.touched = true;
        wall.alpha = 0.18;
        playSound("achievement");
        if (wall.secret) startSecretLevel(wall.x);
      }
    }

    function updateSigns() {
      const p = game.player;
      for (const sign of game.signs) {
        const close = Math.abs((p.x + p.w / 2) - (sign.x + sign.w / 2)) < 72 && Math.abs(p.y - sign.y) < 100;
        if (close && !sign.read) {
          sign.read = true;
          game.behavior.signReads++;
          showToast(sign.truth ? `Sign says: ${sign.text} (weirdly honest)` : `Sign says: ${sign.text}`);
        }
      }
    }

    function judgeSignBehavior(previousX, previousY) {
      for (const sign of game.signs) {
        if (!sign.read || sign.judged) continue;
        const p = game.player;
        const passed = previousX <= sign.x + sign.w && p.x > sign.x + sign.w + 26;
        if (!passed && Math.abs(p.x - sign.x) < 220) continue;
        if (!passed && sign.recommendation !== "jump") continue;
        sign.judged = true;
        let trusted = false;
        let ignoredTrue = false;
        if (sign.recommendation === "jump") {
          trusted = game.behavior.jumps > 0 && Math.abs(p.x - sign.x) < 260;
          ignoredTrue = sign.truth && !trusted;
        } else if (sign.recommendation === "right") {
          trusted = p.x > sign.x + 80;
        } else if (sign.recommendation === "wait") {
          trusted = Math.abs(p.vx) < 30;
          ignoredTrue = sign.truth && !trusted;
        } else if (sign.recommendation === "down") {
          trusted = p.y > sign.y + 60;
        }
        if (trusted) {
          game.behavior.signTrusts++;
          save.stats.signsTrusted++;
          unlock("trustedSign");
          if (!sign.truth) floatingText(sign.x, sign.y - 12, "gottem", "#ff3d81");
        }
        if (ignoredTrue) {
          game.behavior.signIgnores++;
          save.stats.trueSignsIgnored++;
          unlock("ignoredTrueSign");
        }
      }
    }

    function updateTrolls(dt) {
      const p = game.player;
      for (const trap of game.traps) {
        if (trap.triggered && trap.type !== "speedTrap") continue;
        const inTrap = rectsOverlap(p, trap);
        if (!inTrap) continue;
        if (trap.type === "speedTrap" && Math.abs(p.vx) < 160) continue;
        if (trap.type === "forcedJump" && !p.onGround) continue;
        trap.triggered = true;
        activateTrap(trap);
      }

      if (game.mimic) updateMimic(dt);
      for (const hazard of game.hazards) {
        if (hazard.vx) {
          hazard.x += hazard.vx * dt;
          if (Math.abs(hazard.x - hazard.baseX) > 88) hazard.vx *= -1;
        }
      }
    }

    function activateTrap(trap) {
      const p = game.player;
      if (trap.type === "reverse") {
        game.reverseUntil = Math.max(game.reverseUntil, game.time + (trap.boss ? 3.1 : 2.35));
        showToast("Controls reversed. Left is emotionally right.");
        playSound("troll");
        game.shake = 5;
      }

      if (trap.type === "gravity") {
        game.gravityDir *= -1;
        game.gravityUntil = game.time + (trap.boss ? 4.2 : 2.7);
        unlock("gravitySurvived");
        showToast("Gravity reversal. The floor has resigned.");
        playSound("troll");
        game.shake = 9;
      }

      if (trap.type === "fakeLoading") {
        fakeFullScreen("LOADING", ["Generating fairness...", "Removing fun...", "Failed."], 950);
        playSound("troll");
      }

      if (trap.type === "fakeCrash") {
        fakeFullScreen("GAME CRASHED", ["Error 418: Player trusted platform.", "Just kidding. Unfortunately."], 1250);
        playSound("death");
        game.shake = 12;
      }

      if (trap.type === "bugPopup") {
        fakePopup("Bug Report", choose(game.rng, [
          "A player was detected having hope.",
          "Suspicious skill spike. Nerfing confidence.",
          "Fairness module stopped responding.",
          "Exit.exe moved unexpectedly."
        ]), true);
        playSound("troll");
      }

      if (trap.type === "fakeAchievement") {
        fakePopup("Achievement Unlocked", choose(game.rng, [
          "Read The Fine Print",
          "Almost Did Something",
          "Clicked OK Eventually",
          "Beta Tester For Pain"
        ]), false);
        playSound("achievement");
      }

      if (trap.type === "teleport") {
        const current = nearestPathPlatform(p.x);
        const target = game.path[clamp(current.index - (trap.boss ? 2 : 1), 0, game.path.length - 1)];
        burst(p.x + p.w / 2, p.y + p.h / 2, "#8ef6ff", 28);
        p.x = target.x + target.w * 0.45;
        p.y = target.y - p.h - 4;
        p.vx *= -0.35;
        p.vy = -220;
        showToast("Teleport trap. Your progress has been lightly seasoned.");
        playSound("troll");
        game.shake = 8;
      }

      if (trap.type === "obstacleShuffle") {
        shuffleNearbyObstacles(trap.x || p.x);
        showToast("Random obstacle changes. Patch notes said this was fixed.");
        playSound("troll");
        game.shake = 6;
      }

      if (trap.type === "speedTrap") {
        const platform = game.platforms.find(item => item.id === trap.platformId);
        if (platform) {
          game.hazards.push({
            x: platform.x + platform.w * 0.42,
            y: platform.y - 22,
            w: 44,
            h: 22,
            type: "spike",
            active: true,
            revealed: true,
            color: "#ff315a",
            vx: 130,
            baseX: platform.x + platform.w * 0.42
          });
        }
        showToast("Speed trap. Walking was an option, technically.");
        playSound("troll");
      }

      if (trap.type === "forcedJump") {
        floatingText(p.x + 10, p.y - 10, "jump tax", "#ffd166");
        p.vy = -PLAYER.jump * 0.75 * game.gravityDir;
        p.onGround = false;
        showToast("Forced jump section. The game noticed your knees.");
        playSound("jump");
      }

      if (trap.type === "fakeFinal") {
        fakeFullScreen("FINAL LEVEL", ["For real this time.", "Source: trust me."], 950);
      }

      if (trap.type === "cheatingDisabled") {
        showToast("Cheating disabled. Re-enabling for accessibility.");
        fakePopup("Update", "Cheating disabled successfully. Cheating enabled successfully.", false);
      }

      if (trap.type === "mimic") {
        if (!game.mimic) {
          game.mimic = {
            delay: 1.15,
            x: p.x - 110,
            y: p.y,
            w: p.w,
            h: p.h,
            angry: false
          };
          showToast("Mimic trap. It copies your movement, but with worse vibes.");
          playSound("troll");
        }
      }
    }

    function nearestPathPlatform(x) {
      let best = { platform: game.path[0], index: 0, distance: Infinity };
      game.path.forEach((platform, index) => {
        const distance = Math.abs(x - (platform.x + platform.w / 2));
        if (distance < best.distance) best = { platform, index, distance };
      });
      return best;
    }

    function shuffleNearbyObstacles(x) {
      for (const hazard of game.hazards) {
        if (Math.abs(hazard.x - x) < 420) {
          hazard.revealed = true;
          hazard.x += randRange(game.rng, -38, 48);
          hazard.y += randRange(game.rng, -8, 10);
          hazard.x = clamp(hazard.x, 40, game.width - 80);
          burst(hazard.x, hazard.y, "#ff315a", 8);
        }
      }
    }

    function updateMimic(dt) {
      const mimic = game.mimic;
      const targetTime = game.time - mimic.delay;
      let sample = game.runSamples[0];
      for (let i = game.runSamples.length - 1; i >= 0; i--) {
        if (game.runSamples[i].t <= targetTime) {
          sample = game.runSamples[i];
          break;
        }
      }
      if (sample) {
        mimic.x += (sample.x - mimic.x) * clamp(dt * 9, 0, 1);
        mimic.y += (sample.y - mimic.y) * clamp(dt * 9, 0, 1);
      }
      if (rectsOverlap(game.player, mimic) && game.player.spawnGrace <= 0) {
        killPlayer("Your mimic caught you. Technically self-care.");
      }
    }

    function killPlayer(customMessage = "") {
      const p = game && game.player;
      if (!p || !p.alive) return;
      p.alive = false;
      save.levelDeaths++;
      save.totalDeaths++;
      save.currentFailStreak++;
      save.longestFailStreak = Math.max(save.longestFailStreak, save.currentFailStreak);
      save.mostDeathsOnAnyLevel = Math.max(save.mostDeathsOnAnyLevel, save.levelDeaths);
      save.heatSpots.push({
        level: game.levelNumber,
        mode: game.mode,
        x: Math.round(p.x),
        y: Math.round(p.y),
        width: game.width,
        at: Date.now()
      });
      if (save.heatSpots.length > 180) save.heatSpots.splice(0, save.heatSpots.length - 180);
      lastGhost = game.runSamples.slice(-480);
      updateBehaviorProfile(false);
      checkDeathAchievements();
      saveGame();
      playSound("death");
      game.shake = 18;
      burst(p.x + p.w / 2, p.y + p.h / 2, "#ff315a", 44);
      const message = specialDeathMessages[save.totalDeaths] || customMessage || choose(game.rng, deathMessages);
      showToast(message, 2100);
      updateHud();
      setTimeout(() => {
        if (!game) return;
        startLevel({
          levelNumber: game.levelNumber,
          seed: game.seed,
          mode: game.mode,
          dailyDate: game.dailyDate,
          retry: true,
          checkpointIndex: game.checkpointIndex,
          ghost: lastGhost
        });
      }, 760);
    }

    function completeLevel() {
      if (!game || game.completed) return;
      game.completed = true;
      updateBehaviorProfile(true);
      playSound("win");
      burst(game.player.x + game.player.w / 2, game.player.y + game.player.h / 2, "#ffd166", 68);
      game.shake = 10;

      if (game.mode === "daily") {
        const day = game.dailyDate || pendingDailyDate || getDailyDate();
        save.dailyRecords[day] = {
          completed: true,
          deaths: save.levelDeaths,
          level: game.levelNumber,
          at: Date.now()
        };
        unlock("dailyWin");
        save.levelDeaths = 0;
        save.currentFailStreak = 0;
        saveGame();
        fakeFullScreen("DAILY COMPLETE", ["Today's troll has been returned to the lab.", "Come back tomorrow for a new betrayal."], 1600, showMainMenu);
        return;
      }

      if (game.mode === "secret") {
        save.levelDeaths = 0;
        save.currentFailStreak = 0;
        saveGame();
        fakeFullScreen("SECRET CLEARED", ["A hidden level has been beaten.", "The wall is furious."], 1400, () => startNormalLevel(false));
        return;
      }

      const completedDeaths = save.levelDeaths;
      save.levelsCompleted++;
      save.completedDeathsTotal += completedDeaths;
      save.currentLevel++;
      save.levelDeaths = 0;
      save.currentFailStreak = 0;
      save.currentLevelSeed = hashString(`normal:${save.currentLevel}:${Date.now()}:${save.totalDeaths}:${Math.random()}`);
      if (game.bossType) {
        save.stats.bossWins++;
        unlock("bossDefeated");
      }
      checkLevelAchievements();
      saveGame();

      const line = game.bossType
        ? "Boss defeated. It is updating its resume."
        : choose(game.rng, [
          "Level complete. The next one read your diary.",
          "You win! For now. Briefly. Suspiciously.",
          "Exit reached. The game is pretending to clap.",
          "Nice. The algorithm took notes."
        ]);
      fakeFullScreen("LEVEL CLEAR", [line, `Deaths this level: ${completedDeaths}`], 1150, () => startNormalLevel(false));
    }

    function updateBehaviorProfile(won) {
      if (!game || !game.behavior.frames) return;
      const b = game.behavior;
      const seconds = Math.max(1, game.time);
      const jumpRate = clamp(b.jumps / seconds, 0, 1.6) / 1.6;
      const waitRatio = b.waitFrames / b.frames;
      const avgSpeed = b.distance / seconds;
      const riskRatio = b.riskFrames / b.frames;
      const signAttempts = Math.max(1, b.signTrusts + b.signIgnores);
      const signTrust = b.signReads ? b.signTrusts / signAttempts : save.behaviorProfile.signTrust;
      const leftRightFlip = Math.min(b.leftFrames, b.rightFrames) / Math.max(1, b.frames);
      const blend = won ? 0.28 : 0.18;
      const profile = save.behaviorProfile;
      profile.jumpRate = lerp(profile.jumpRate, jumpRate, blend);
      profile.waitRatio = lerp(profile.waitRatio, waitRatio, blend);
      profile.avgSpeed = lerp(profile.avgSpeed, avgSpeed, blend);
      profile.riskRatio = lerp(profile.riskRatio, riskRatio, blend);
      profile.signTrust = lerp(profile.signTrust, signTrust, blend);
      profile.leftRightFlip = lerp(profile.leftRightFlip, leftRightFlip, blend);
    }

    function lerp(a, b, t) {
      return a + (b - a) * t;
    }

    function burst(x, y, color, count) {
      if (!game) return;
      for (let i = 0; i < count; i++) {
        const angle = Math.random() * Math.PI * 2;
        const speed = randRange(Math.random, 70, 330);
        game.particles.push({
          x,
          y,
          vx: Math.cos(angle) * speed,
          vy: Math.sin(angle) * speed,
          life: randRange(Math.random, 0.35, 0.85),
          maxLife: 0.85,
          size: randRange(Math.random, 3, 8),
          color
        });
      }
    }

    function floatingText(x, y, text, color) {
      game.floatingTexts.push({ x, y, text, color, life: 1.1 });
    }

    function updateParticles(dt) {
      for (let i = game.particles.length - 1; i >= 0; i--) {
        const particle = game.particles[i];
        particle.life -= dt;
        particle.vy += 420 * dt;
        particle.x += particle.vx * dt;
        particle.y += particle.vy * dt;
        if (particle.life <= 0) game.particles.splice(i, 1);
      }
      for (let i = game.floatingTexts.length - 1; i >= 0; i--) {
        const text = game.floatingTexts[i];
        text.life -= dt;
        text.y -= 34 * dt;
        if (text.life <= 0) game.floatingTexts.splice(i, 1);
      }
      game.shake = Math.max(0, game.shake - dt * 34);
    }

    function updateCamera(dt) {
      const p = game.player;
      const target = clamp(p.x - W * 0.38, 0, Math.max(0, game.width - W));
      game.cameraX += (target - game.cameraX) * clamp(dt * 7, 0, 1);
    }

    function updateHud() {
      if (!game) return;
      hudStats.innerHTML = `
        <div class="hudChip">${game.mode === "daily" ? "Daily" : game.mode === "secret" ? "Secret" : "Level"} ${game.mode === "normal" ? save.currentLevel : game.levelNumber}</div>
        <div class="hudChip">Deaths This Level: ${save.levelDeaths}</div>
        <div class="hudChip">Total Deaths: ${save.totalDeaths}</div>
        <div class="hudChip">Fail Streak: ${save.currentFailStreak}</div>
        <div class="hudChip">${getTitle()}</div>
      `;
    }

    function render() {
      if (screen !== "game" || !game) {
        renderMenuBackground();
        return;
      }

      const shakeX = game.shake ? randRange(Math.random, -game.shake, game.shake) : 0;
      const shakeY = game.shake ? randRange(Math.random, -game.shake, game.shake) : 0;
      ctx.save();
      ctx.translate(Math.round(-game.cameraX + shakeX), Math.round(shakeY));

      drawBackground();
      drawHeatmap();
      drawGhost();
      drawPlatforms();
      drawFakeWalls();
      drawTrapsAndDecor();
      drawHazards();
      drawCheckpoints();
      drawButtons();
      drawExits();
      drawSigns();
      drawMimic();
      drawPlayer();
      drawParticles();
      ctx.restore();

      drawVignette();
      if (game.gravityDir < 0) drawGravityWarning();
      if (game.time < game.reverseUntil) drawReverseWarning();
    }

    function renderMenuBackground() {
      const t = performance.now() / 1000;
      const gradient = ctx.createLinearGradient(0, 0, 0, H);
      gradient.addColorStop(0, "#62d9ff");
      gradient.addColorStop(1, "#7161ff");
      ctx.fillStyle = gradient;
      ctx.fillRect(0, 0, W, H);
      for (let i = 0; i < 50; i++) {
        const x = (i * 173 + t * (12 + i % 5)) % (W + 120) - 60;
        const y = 40 + (i * 47) % 410;
        ctx.fillStyle = i % 2 ? "rgba(255,255,255,.16)" : "rgba(255,209,102,.2)";
        pixelRect(x, y + Math.sin(t + i) * 5, 28 + (i % 4) * 12, 8 + (i % 3) * 4);
      }
    }

    function drawBackground() {
      const sky = ctx.createLinearGradient(0, 0, 0, H);
      sky.addColorStop(0, `hsl(${game.skyHue}, 98%, 68%)`);
      sky.addColorStop(0.55, "#8ef6ff");
      sky.addColorStop(1, "#6d3dff");
      ctx.fillStyle = sky;
      ctx.fillRect(game.cameraX - 20, 0, W + 40, H);

      const cam = game.cameraX;
      for (let layer = 0; layer < 3; layer++) {
        const speed = 0.12 + layer * 0.08;
        const size = 32 + layer * 28;
        ctx.fillStyle = layer === 0 ? "rgba(255,255,255,.18)" : layer === 1 ? "rgba(255,248,219,.16)" : "rgba(32,22,83,.18)";
        for (let x = -size * 2; x < game.width + size * 2; x += size * 3.2) {
          const px = x + ((cam * speed) % (size * 3.2));
          const y = 48 + layer * 70 + Math.sin((x + game.time * 30) * 0.01) * 12;
          pixelRect(px, y, size * 1.7, size * 0.42);
          pixelRect(px + size * 0.5, y - size * 0.24, size, size * 0.36);
        }
      }

      ctx.fillStyle = "rgba(23,18,45,.22)";
      for (let x = -120; x < game.width + 140; x += 96) {
        const h = 60 + ((x * 13) % 80 + 80) % 80;
        pixelRect(x, H - h, 64, h);
        pixelRect(x + 16, H - h - 18, 32, 18);
      }
    }

    function drawHeatmap() {
      if (!game.showHeatmap) return;
      const spots = save.heatSpots.filter(spot => spot.mode === game.mode && Math.abs(spot.level - game.levelNumber) <= 1);
      for (const spot of spots) {
        const alpha = spot.level === game.levelNumber ? 0.18 : 0.08;
        const radius = spot.level === game.levelNumber ? 42 : 28;
        const gradient = ctx.createRadialGradient(spot.x, spot.y, 4, spot.x, spot.y, radius);
        gradient.addColorStop(0, `rgba(255,49,90,${alpha * 1.8})`);
        gradient.addColorStop(1, "rgba(255,49,90,0)");
        ctx.fillStyle = gradient;
        ctx.fillRect(spot.x - radius, spot.y - radius, radius * 2, radius * 2);
      }
    }

    function drawGhost() {
      if (!game.replayGhost || !game.replayGhost.length) return;
      ctx.save();
      ctx.globalAlpha = 0.26;
      for (let i = 0; i < game.replayGhost.length; i += 16) {
        const sample = game.replayGhost[i];
        drawPlayerBody(sample.x, sample.y, sample.facing, "#fff8db", "#8ef6ff", true);
      }
      ctx.restore();
    }

    function drawPlatforms() {
      for (const platform of game.platforms) {
        ctx.save();
        ctx.globalAlpha = platform.alpha ?? 1;
        let color = platform.color || "#ffd166";
        if (platform.type === "fake") color = "#90ffb5";
        if (platform.type === "disappear") color = "#ffdd75";
        if (platform.type === "moving") color = "#8ef6ff";
        if (platform.type === "ceiling") color = "#b18cff";
        drawBlock(platform.x, platform.y, platform.w, platform.h, color);
        if (platform.type === "disappear") {
          ctx.fillStyle = "rgba(255,49,90,.58)";
          for (let x = platform.x + 8; x < platform.x + platform.w - 6; x += 18) {
            pixelRect(x, platform.y + 8, 8, 8);
          }
        }
        if (platform.type === "moving") {
          ctx.fillStyle = "rgba(23,18,45,.42)";
          pixelRect(platform.baseX - platform.amplitude, platform.y + platform.h + 8, platform.amplitude * 2 + platform.w, 5);
        }
        ctx.restore();
      }
    }

    function drawBlock(x, y, w, h, color) {
      ctx.fillStyle = "rgba(23,18,45,.35)";
      pixelRect(x + 6, y + 8, w, h);
      ctx.fillStyle = color;
      pixelRect(x, y, w, h);
      ctx.fillStyle = "rgba(255,255,255,.36)";
      pixelRect(x + 4, y + 4, w - 8, 5);
      ctx.fillStyle = "rgba(23,18,45,.25)";
      pixelRect(x + 5, y + h - 7, w - 10, 5);
      ctx.strokeStyle = "rgba(23,18,45,.72)";
      ctx.lineWidth = 3;
      ctx.strokeRect(Math.round(x) + 1.5, Math.round(y) + 1.5, Math.round(w) - 3, Math.round(h) - 3);
    }

    function drawHazards() {
      for (const hazard of game.hazards) {
        if (hazard.type === "invisible" && !hazard.revealed) {
          ctx.fillStyle = "rgba(255,255,255,.06)";
          pixelRect(hazard.x, hazard.y + hazard.h - 3, hazard.w, 3);
          continue;
        }
        ctx.fillStyle = hazard.type === "antiJump" ? "#ff8ad8" : hazard.color;
        if (hazard.type === "antiJump") {
          drawBlock(hazard.x, hazard.y, hazard.w, hazard.h, "#ff8ad8");
          ctx.fillStyle = "#fff8db";
          pixelRect(hazard.x + 6, hazard.y + 5, hazard.w - 12, 4);
        } else {
          const spikes = Math.max(1, Math.floor(hazard.w / 14));
          for (let i = 0; i < spikes; i++) {
            const sx = hazard.x + i * (hazard.w / spikes);
            ctx.beginPath();
            ctx.moveTo(sx, hazard.y + hazard.h);
            ctx.lineTo(sx + hazard.w / spikes / 2, hazard.y);
            ctx.lineTo(sx + hazard.w / spikes, hazard.y + hazard.h);
            ctx.closePath();
            ctx.fill();
            ctx.strokeStyle = "rgba(23,18,45,.75)";
            ctx.lineWidth = 2;
            ctx.stroke();
          }
        }
      }
    }

    function drawTrapsAndDecor() {
      for (const arrow of game.arrows) {
        ctx.save();
        ctx.translate(arrow.x, arrow.y);
        ctx.scale(arrow.dir, 1);
        ctx.fillStyle = arrow.wrong ? "rgba(255,61,129,.7)" : "rgba(255,255,255,.7)";
        pixelRect(-20, -6, 28, 12);
        ctx.beginPath();
        ctx.moveTo(8, -17);
        ctx.lineTo(30, 0);
        ctx.lineTo(8, 17);
        ctx.closePath();
        ctx.fill();
        ctx.restore();
      }
      for (const trap of game.traps) {
        if (trap.type === "teleport") {
          ctx.strokeStyle = "rgba(142,246,255,.7)";
          ctx.lineWidth = 5;
          ctx.beginPath();
          ctx.ellipse(trap.x + trap.w / 2, trap.y + trap.h / 2, 20, 30, 0, 0, Math.PI * 2);
          ctx.stroke();
        }
      }
    }

    function drawFakeWalls() {
      for (const wall of game.fakeWalls) {
        ctx.save();
        ctx.globalAlpha = wall.touched ? 0.18 : 0.92;
        drawBlock(wall.x, wall.y, wall.w, wall.h, "#7250d8");
        ctx.fillStyle = "rgba(255,255,255,.18)";
        pixelRect(wall.x + 6, wall.y + 9, wall.w - 12, 8);
        ctx.restore();
      }
    }

    function drawCheckpoints() {
      for (const checkpoint of game.checkpoints) {
        ctx.fillStyle = checkpoint.fake ? "#ff3d81" : "#34f5c5";
        pixelRect(checkpoint.x, checkpoint.y, 5, checkpoint.h);
        ctx.fillStyle = checkpoint.used ? "#fff8db" : (checkpoint.fake ? "#ff8ad8" : "#8effdf");
        pixelRect(checkpoint.x + 5, checkpoint.y + 3, 30, 18);
        ctx.fillStyle = "rgba(23,18,45,.28)";
        pixelRect(checkpoint.x + 5, checkpoint.y + 15, 22, 6);
      }
    }

    function drawButtons() {
      for (const button of game.buttons) {
        drawBlock(button.x, button.y + (button.pressed ? 6 : 0), button.w, button.h, button.pressed ? "#897a6c" : "#ff3d81");
        ctx.fillStyle = "#fff8db";
        ctx.font = "700 9px Trebuchet MS";
        ctx.textAlign = "center";
        ctx.fillText(button.label, button.x + button.w / 2, button.y - 6);
      }
    }

    function drawExits() {
      for (const exit of game.exits) {
        const pulse = Math.sin(game.time * 6 + exit.x * 0.01) * 0.5 + 0.5;
        ctx.fillStyle = exit.fake ? "#ff3d81" : "#34f5c5";
        pixelRect(exit.x - 8, exit.y + 6, exit.w + 16, exit.h - 6);
        ctx.fillStyle = exit.fake ? "#631942" : "#153e49";
        pixelRect(exit.x, exit.y, exit.w, exit.h);
        ctx.fillStyle = exit.fake ? `rgba(255,255,255,${0.18 + pulse * 0.22})` : `rgba(255,255,255,${0.28 + pulse * 0.22})`;
        pixelRect(exit.x + 9, exit.y + 10, exit.w - 18, exit.h - 20);
        ctx.fillStyle = "#fff8db";
        ctx.font = "900 11px Trebuchet MS";
        ctx.textAlign = "center";
        ctx.fillText(exit.label, exit.x + exit.w / 2, exit.y - 8);
      }
    }

    function drawSigns() {
      const p = game.player;
      for (const sign of game.signs) {
        ctx.fillStyle = "#6b421d";
        pixelRect(sign.x + 16, sign.y + 28, 6, 28);
        drawBlock(sign.x, sign.y, sign.w, 28, sign.truth ? "#ffd166" : "#fff8db");
        ctx.fillStyle = "#17122d";
        ctx.font = "900 9px Trebuchet MS";
        ctx.textAlign = "center";
        ctx.fillText(sign.text, sign.x + sign.w / 2, sign.y + 18);
        const close = Math.abs((p.x + p.w / 2) - (sign.x + sign.w / 2)) < 78 && Math.abs(p.y - sign.y) < 110;
        if (close) {
          ctx.fillStyle = "rgba(23,18,45,.82)";
          roundRect(sign.x - 26, sign.y - 36, sign.w + 52, 24, 8);
          ctx.fillStyle = "#fff8db";
          ctx.font = "800 11px Trebuchet MS";
          ctx.fillText(sign.truth ? "probably true?" : "official advice", sign.x + sign.w / 2, sign.y - 20);
        }
      }
    }

    function drawMimic() {
      if (!game.mimic) return;
      ctx.save();
      ctx.globalAlpha = 0.86;
      drawPlayerBody(game.mimic.x, game.mimic.y, -game.player.facing, "#ff315a", "#17122d", false);
      ctx.restore();
    }

    function drawPlayer() {
      const p = game.player;
      if (!p.alive && Math.floor(game.time * 18) % 2) return;
      drawPlayerBody(p.x, p.y, p.facing, "#fff8db", game.accent, false);
    }

    function drawPlayerBody(x, y, facing, skin, shirt, ghost) {
      const bob = ghost ? 0 : Math.sin(game.time * 12) * (game.player.onGround ? 1 : 0);
      ctx.save();
      ctx.translate(Math.round(x), Math.round(y + bob));
      if (facing < 0) {
        ctx.translate(PLAYER.w, 0);
        ctx.scale(-1, 1);
      }
      ctx.fillStyle = "rgba(23,18,45,.28)";
      pixelRect(2, PLAYER.h + 1, PLAYER.w - 2, 5);
      ctx.fillStyle = shirt;
      pixelRect(3, 12, 19, 18);
      ctx.fillStyle = skin;
      pixelRect(5, 2, 16, 14);
      ctx.fillStyle = "#17122d";
      pixelRect(15, 7, 4, 4);
      ctx.fillStyle = "#ff3d81";
      pixelRect(7, 17, 13, 4);
      ctx.fillStyle = "#17122d";
      pixelRect(4, 30, 7, 5);
      pixelRect(16, 30, 7, 5);
      ctx.fillStyle = "rgba(255,255,255,.45)";
      pixelRect(7, 4, 5, 3);
      ctx.restore();
    }

    function drawParticles() {
      for (const particle of game.particles) {
        ctx.globalAlpha = clamp(particle.life / particle.maxLife, 0, 1);
        ctx.fillStyle = particle.color;
        pixelRect(particle.x, particle.y, particle.size, particle.size);
        ctx.globalAlpha = 1;
      }
      for (const text of game.floatingTexts) {
        ctx.globalAlpha = clamp(text.life, 0, 1);
        ctx.fillStyle = text.color;
        ctx.font = "900 16px Trebuchet MS";
        ctx.textAlign = "center";
        ctx.fillText(text.text, text.x, text.y);
        ctx.globalAlpha = 1;
      }
    }

    function drawVignette() {
      const gradient = ctx.createRadialGradient(W / 2, H / 2, 120, W / 2, H / 2, W * 0.7);
      gradient.addColorStop(0, "rgba(0,0,0,0)");
      gradient.addColorStop(1, "rgba(0,0,0,.28)");
      ctx.fillStyle = gradient;
      ctx.fillRect(0, 0, W, H);
    }

    function drawGravityWarning() {
      ctx.fillStyle = "rgba(255,61,129,.16)";
      ctx.fillRect(0, 0, W, H);
      ctx.fillStyle = "#fff8db";
      ctx.font = "900 20px Trebuchet MS";
      ctx.textAlign = "center";
      ctx.fillText("GRAVITY IS CURRENTLY DOING A BIT", W / 2, H - 36);
    }

    function drawReverseWarning() {
      ctx.fillStyle = "rgba(255,209,102,.16)";
      ctx.fillRect(0, 0, W, H);
      ctx.fillStyle = "#17122d";
      ctx.font = "900 18px Trebuchet MS";
      ctx.textAlign = "center";
      ctx.fillText("← means → because comedy", W / 2, 58);
    }

    function pixelRect(x, y, w, h) {
      ctx.fillRect(Math.round(x), Math.round(y), Math.round(w), Math.round(h));
    }

    function roundRect(x, y, w, h, radius) {
      ctx.beginPath();
      ctx.moveTo(x + radius, y);
      ctx.arcTo(x + w, y, x + w, y + h, radius);
      ctx.arcTo(x + w, y + h, x, y + h, radius);
      ctx.arcTo(x, y + h, x, y, radius);
      ctx.arcTo(x, y, x + w, y, radius);
      ctx.closePath();
      ctx.fill();
    }

    function setupInput() {
      window.addEventListener("keydown", event => {
        startAudio();
        if (event.repeat && ["Space", "ArrowUp", "KeyW"].includes(event.code)) return;
        if (screen === "game" && ["ArrowLeft", "ArrowRight", "ArrowUp", "Space", "KeyA", "KeyD", "KeyW", "KeyH", "Escape", "KeyR"].includes(event.code)) {
          event.preventDefault();
        }
        if (event.code === "ArrowLeft" || event.code === "KeyA") input.left = true;
        if (event.code === "ArrowRight" || event.code === "KeyD") input.right = true;
        if (event.code === "ArrowUp" || event.code === "KeyW" || event.code === "Space") {
          input.jump = true;
          input.jumpPressed = true;
        }
        if (event.code === "KeyH" && game) {
          game.showHeatmap = !game.showHeatmap;
          showToast(game.showHeatmap ? "Heatmap on. Red blobs are your greatest hits." : "Heatmap off. Denial mode.");
        }
        if (event.code === "KeyR" && game) killPlayer("Manual retry. The game accepts your offering.");
        if (event.code === "Escape") {
          if (screen === "game") {
            saveGame();
            showMainMenu();
          } else {
            showMainMenu();
          }
        }
      });

      window.addEventListener("keyup", event => {
        if (event.code === "ArrowLeft" || event.code === "KeyA") input.left = false;
        if (event.code === "ArrowRight" || event.code === "KeyD") input.right = false;
        if (event.code === "ArrowUp" || event.code === "KeyW" || event.code === "Space") input.jump = false;
      });

      document.querySelectorAll(".touchBtn").forEach(button => {
        const control = button.dataset.control;
        const set = value => {
          startAudio();
          input.usingTouch = true;
          input[control] = value;
          if (control === "jump" && value) input.jumpPressed = true;
          button.classList.toggle("active", value);
        };
        button.addEventListener("pointerdown", event => {
          event.preventDefault();
          button.setPointerCapture(event.pointerId);
          set(true);
        });
        button.addEventListener("pointerup", event => {
          event.preventDefault();
          set(false);
        });
        button.addEventListener("pointercancel", () => set(false));
        button.addEventListener("lostpointercapture", () => set(false));
      });
    }

    function loop(now) {
      const dt = (now - lastFrame) / 1000;
      lastFrame = now;
      update(dt);
      render();
      requestAnimationFrame(loop);
    }

    setupInput();
    showMainMenu();
    updateHud();
    requestAnimationFrame(loop);
  })();
  </script>
</body>
</html>
